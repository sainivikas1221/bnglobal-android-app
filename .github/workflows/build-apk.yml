name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BNGlobal-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Commit APK back into repo
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/BNGlobal-debug.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release/BNGlobal-debug.apk
          git diff --staged --quiet || git commit -m "Add built APK [skip ci]"
          git push

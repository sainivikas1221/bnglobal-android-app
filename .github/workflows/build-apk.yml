name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BNGlobal-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Decode release keystore
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > /tmp/bnglobal-release.jks

      - name: Build signed release AAB
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PATH: /tmp/bnglobal-release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: gradle bundleRelease --no-daemon

      - name: Upload AAB as workflow artifact
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: BNGlobal-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Commit APK (and AAB if built) back into repo
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/BNGlobal-debug.apk
          if [ -n "$RELEASE_KEYSTORE_BASE64" ] && [ -f app/build/outputs/bundle/release/app-release.aab ]; then
            cp app/build/outputs/bundle/release/app-release.aab release/BNGlobal-release.aab
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release/
          git diff --staged --quiet || git commit -m "Add built APK/AAB [skip ci]"
          git push

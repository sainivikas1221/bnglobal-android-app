name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build debug APKs (all modules)
        run: gradle assembleDebug --no-daemon

      - name: Build signed release AABs (all modules)
        run: gradle bundleRelease --no-daemon

      - name: Upload BNGlobal artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BNGlobal-build-outputs
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/bundle/release/*.aab

      - name: Upload GenieCorps artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GenieCorps-build-outputs
          path: |
            geniecorps-app/build/outputs/apk/debug/*.apk
            geniecorps-app/build/outputs/bundle/release/*.aab

      - name: Commit APKs and AABs back into repo
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/BNGlobal-debug.apk
          cp app/build/outputs/bundle/release/*.aab release/BNGlobal-release.aab
          cp geniecorps-app/build/outputs/apk/debug/*.apk release/GenieCorps-debug.apk
          cp geniecorps-app/build/outputs/bundle/release/*.aab release/GenieCorps-release.aab
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release/
          git diff --staged --quiet || git commit -m "Add built APKs/AABs [skip ci]"
          git push
